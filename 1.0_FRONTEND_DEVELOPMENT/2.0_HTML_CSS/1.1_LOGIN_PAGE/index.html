<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>

    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: white;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .card {
        background-color: rgb(218, 84, 84);
        border-radius: 8px;
        padding: 30px;
        width: 300px;
      }
      h2 {
        color: whitesmoke;
        text-align: center;
        margin-bottom: 20px;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      input {
        margin-bottom: px;
        padding: 10px;
        border-radius: 5px;
        background-color: hwb(0 88% 7%);
      }
      button {
        background-color: hwb(0 87% 3%);
        padding: 10px;
        border-radius: 10px;
      }
      button:hover {
        background-color: beige;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2 style="color: hwb(0 88% 7%)">Login</h2>
      <form>
        <input type="email" placeholder="Email" />
        <input type="password" placeholder="Password" />
        <button type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
